<!DOCTYPE html>
<html>
<head>
<title>Map Mode Preview — Directive CRM</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d1117; color: white; font-family: 'Inter', system-ui, sans-serif; }
  .container { display: flex; gap: 16px; padding: 16px; height: 100vh; }
  .panel { flex: 1; display: flex; flex-direction: column; gap: 12px; }
  .label {
    text-align: center; font-size: 18px; font-weight: 600;
    padding: 12px;
    background: rgba(13,17,23,0.75);
    backdrop-filter: blur(24px);
    border: 1px solid rgba(6,182,212,0.12);
    border-radius: 12px;
    color: #06b6d4;
  }
  .map-container {
    flex: 1;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid rgba(6,182,212,0.12);
  }
  .glass-overlay {
    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
    z-index: 1000;
    background: rgba(13,17,23,0.75);
    backdrop-filter: blur(24px);
    border: 1px solid rgba(6,182,212,0.12);
    border-radius: 12px;
    padding: 12px 24px;
    color: #e5e7eb;
    font-size: 13px;
    text-align: center;
    pointer-events: none;
  }
  .leaflet-control-attribution { display: none !important; }
</style>
</head>
<body>
<div class="container">
  <div class="panel">
    <div class="label">🌙 Night Mode (CartoDB Dark Matter)</div>
    <div class="map-container" style="position: relative;">
      <div id="map-dark" style="width:100%;height:100%;"></div>
      <div class="glass-overlay">Dark theme · Free · No API key · Matches glass panels</div>
    </div>
  </div>
  <div class="panel">
    <div class="label">🛰 Satellite (ESRI World Imagery)</div>
    <div class="map-container" style="position: relative;">
      <div id="map-sat" style="width:100%;height:100%;"></div>
      <div class="glass-overlay">Satellite photos · Free · No API key · Shows actual roofs</div>
    </div>
  </div>
</div>
<script>
  const lat = 34.7304, lng = -86.5861, zoom = 15;

  const darkMap = L.map('map-dark', { attributionControl: false }).setView([lat, lng], zoom);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(darkMap);

  const satMap = L.map('map-sat', { attributionControl: false }).setView([lat, lng], zoom);
  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 19 }).addTo(satMap);
</script>
</body>
</html>
